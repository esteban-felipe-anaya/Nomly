<?xml version="1.0" encoding="UTF-8"?>
<!-- Nomly launcher mark. Orange #E0531F rounded square, white takeout bag,
     fork cut out (orange shows through). Mirrors tool/generate_icon.py.
     Export to PNG: e.g. `rsvg-convert -w 1024 -h 1024 icon.svg -o icon.png`
     or `inkscape icon.svg --export-filename=icon.png -w 1024 -h 1024`. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" rx="220" fill="#E0531F"/>
  <!-- Bag, white, with fork punched out via even-odd fill -->
  <g fill="#ffffff" fill-rule="evenodd">
    <path d="
      M312 476 a46 46 0 0 1 46 -46 h308 a46 46 0 0 1 46 46 v284 a46 46 0 0 1 -46 46 h-308 a46 46 0 0 1 -46 -46 z
      M300 352 h424 l-24 80 h-376 z
    "/>
  </g>
  <!-- Cut-outs (orange) drawn on top: fold line, handle slot, fork -->
  <g fill="#E0531F">
    <rect x="322" y="424" width="380" height="12" rx="6"/>
    <rect x="462" y="372" width="100" height="30" rx="15"/>
    <!-- fork tines -->
    <rect x="461" y="470" width="22" height="90" rx="10"/>
    <rect x="501" y="470" width="22" height="90" rx="10"/>
    <rect x="541" y="470" width="22" height="90" rx="10"/>
    <!-- shoulder + handle -->
    <rect x="461" y="548" width="102" height="40" rx="18"/>
    <rect x="495" y="568" width="34" height="158" rx="17"/>
  </g>
</svg>
